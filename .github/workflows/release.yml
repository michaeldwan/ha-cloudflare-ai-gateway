name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Validate tag matches manifest version
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          manifest_version=$(python3 -c "import json; print(json.load(open('custom_components/cloudflare_ai_gateway/manifest.json'))['version'])")
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag version ($tag_version) does not match manifest.json version ($manifest_version)"
            exit 1
          fi

      - name: Package integration
        run: |
          cd custom_components/cloudflare_ai_gateway
          zip -r ../../cloudflare_ai_gateway.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cloudflare_ai_gateway.zip
