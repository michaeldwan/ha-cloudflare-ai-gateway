[tools]
uv = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.setup]
description = "Install dependencies and configure dev environment"
run = "scripts/setup"

[tasks.develop]
description = "Start Home Assistant in Docker with the integration loaded"
run = "docker compose -f docker-compose.dev.yml up"

[tasks.test]
description = "Run tests"
run = "uv run pytest tests/ -v --timeout=30"

[tasks.lint]
description = "Run linter and format check"
run = """
uv run ruff check custom_components/ tests/
uv run ruff format --check custom_components/ tests/
"""

[tasks.format]
description = "Auto-format code"
run = "uv run ruff format custom_components/ tests/"

[tasks.validate]
description = "Run all checks (lint, format, tests) — same as CI"
depends = ["lint", "test"]

[tasks.release]
description = "Validate, tag a new release, and push"
usage = 'arg "<version>"'
depends = ["validate"]
run = """
version="$usage_version"
if ! echo "$version" | grep -qE '^[0-9]+\\.[0-9]+\\.[0-9]+$'; then
  echo "Invalid version: $version (expected X.Y.Z)" >&2
  exit 1
fi
git tag "v$version"
git push origin "v$version"
"""
